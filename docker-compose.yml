version: '3.8'


services:


  # ─────────────────────────────────────────────
  # Application
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr_app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      db-init:
        condition: service_completed_successfully
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      APP_NAME: ${APP_NAME:-ocr-extraction}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-AppUser@2025@}
      DB_NAME: ${DB_NAME:-ocr_db}
      DB_SCHEMA: ${DB_SCHEMA:-public}
      DB_SSL: ${DB_SSL:-false}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      DB_LOGGING: ${DB_LOGGING:-false}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-Redis123}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_TTL: ${REDIS_TTL:-3600}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-invoice-processing:}
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-invoice-processing-api}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-invoice-processing-group}
      KAFKA_SSL: ${KAFKA_SSL:-false}
      OCR_KAFKA_TOPIC: ${OCR_KAFKA_TOPIC:-ocr.processing}
      OCR_JOB_CACHE_TTL: ${OCR_JOB_CACHE_TTL:-86400}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-./uploads}
      LOCAL_STORAGE_BASE_URL: ${LOCAL_STORAGE_BASE_URL:-http://localhost:3000/uploads}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-uploads}
      VEDAS_OCR_API_URL: ${VEDAS_OCR_API_URL:-https://pos-ocr.vedastudios.com.np/api/v1/extract}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_DIR: ${LOG_DIR:-logs}
      LOG_MAX_FILES: ${LOG_MAX_FILES:-14d}
      LOG_MAX_SIZE: ${LOG_MAX_SIZE:-20m}
    volumes:
      - ocr_uploads:/app/uploads
      - ocr_logs:/app/logs
    restart: unless-stopped
    networks:
      - ocr_network


  # ─────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: ocr_db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-AppUser@2025@}
      POSTGRES_DB: ${DB_NAME:-ocr_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ocr_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-appuser} -d ${DB_NAME:-ocr_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - ocr_network


  # Runs DDL script once after db is healthy
  db-init:
    image: postgres:15-alpine
    container_name: ocr_db_init
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:-AppUser@2025@}
    volumes:
      - ./scripts/ddl.sql:/docker-entrypoint-initdb.d/ddl.sql:ro
    command: >
      psql
        -h db
        -U ${DB_USERNAME:-appuser}
        -d ${DB_NAME:-ocr_db}
        -f /docker-entrypoint-initdb.d/ddl.sql
    restart: on-failure
    networks:
      - ocr_network


  # ─────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ocr_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-Redis123}
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ocr_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-Redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - ocr_network


  # ─────────────────────────────────────────────
  # Kafka
  # ─────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: ocr_kafka
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "29092:29092"
    volumes:
      - ocr_kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - ocr_network


  # Creates ocr.processing topic once kafka is healthy
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: ocr_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      /opt/kafka/bin/kafka-topics.sh
        --bootstrap-server kafka:9092
        --create
        --if-not-exists
        --topic ocr.processing
        --partitions 1
        --replication-factor 1
    restart: on-failure
    networks:
      - ocr_network


  # ─────────────────────────────────────────────
  # MinIO
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ocr_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ocr_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - ocr_network


  # Creates uploads bucket once minio is healthy
  minio-init:
    image: minio/mc:latest
    container_name: ocr_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
        mc mb --ignore-existing local/uploads &&
        echo 'Bucket uploads created successfully'
      "
    restart: on-failure
    networks:
      - ocr_network


# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  ocr_db_data:
  ocr_redis_data:
  ocr_kafka_data:
  ocr_minio_data:
  ocr_uploads:
  ocr_logs:


# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  ocr_network:
    driver: bridge



